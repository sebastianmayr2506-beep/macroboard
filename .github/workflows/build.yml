name: Build ZMK firmware
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout config
        uses: actions/checkout@v4
        with:
          path: config

      - name: Init west
        run: |
          west init -l config
          west update
          west zephyr-export

      - name: Build firmware
        run: |
          west build -s zmk/app -b nice_nano_v2 -- \
            -DZMK_CONFIG="${GITHUB_WORKSPACE}/config/config" \
            -DZMK_EXTRA_MODULES="${GITHUB_WORKSPACE}/config" \
            -DSHIELD=macropad \
            -DSNIPPET=studio-rpc-usb-uart \
            -DCONFIG_ZMK_STUDIO=y

      - name: Rename firmware
        run: cp build/zephyr/zmk.uf2 macropad-nice_nano_v2-zmk.uf2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: macropad-nice_nano_v2-zmk.uf2

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: firmware

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Macropad Firmware (latest)
          body: "Automatisch gebaute Firmware. Einfach die .uf2 Datei auf den Controller ziehen."
          files: "*.uf2"
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
